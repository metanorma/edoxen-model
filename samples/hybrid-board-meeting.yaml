# Hybrid Board Meeting (sample) — corporate governance use case
# Demonstrates: polymorphic Venue (physical + virtual + phone), Officer
# roles (chair, secretary, treasurer, parliamentarian), roll_call
# voting with casting_vote tie-breaker, multiple Officer roles.

