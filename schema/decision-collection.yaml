        type: string
        format: date-time
      ends_at:
        type: string
        format: date-time
      time_label:
        type: array
        items:
          "$ref": "#/$defs/LocalizedString"
      venue_refs:
        type: array
        items:
          type: string
      officers:
        type: array
        items:
          "$ref": "#/$defs/Officer"
      agenda_ref:
        type: string
      minutes_ref:
        type: string
      attendance_refs:
        type: array
        items:
          type: string
      extensions:
        type: array
        items:
          "$ref": "#/$defs/MeetingExtension"
  MeetingSeries:
    type: object
    description: 'Parent of recurring Meeting instances. 1.0: per-field Localized.'
    additionalProperties: false
    properties:
      identifier:
        type: array
        items:
          "$ref": "#/$defs/StructuredIdentifier"
      urn:
        type: string
      name:
        type: array
        items:
          "$ref": "#/$defs/LocalizedString"
      description:
        type: array
        items:
          "$ref": "#/$defs/LocalizedString"
      recurrence:
        "$ref": "#/$defs/Recurrence"
      term:
        type: string
      contact:
        "$ref": "#/$defs/Contact"
      hosts:
        type: array
        items:
          "$ref": "#/$defs/HostRef"
      kind:
        type: string
      meeting_refs:
        type: array
        items:
          type: string
      extensions:
        type: array
        items:
          "$ref": "#/$defs/MeetingExtension"
      body_type:
        type: string
  HostRef:
    type: object
    description: Typed reference to a hosting organization.
    additionalProperties: false
    required:
    - ref
    properties:
      ref:
        type: string
      type:
        "$ref": "#/$defs/HostType"
      role:
        type: string
      contact:
        "$ref": "#/$defs/Contact"
  ContactRegister:
    type: object
    description: |
      Registry of Contacts indexed by scoped URN. Members carry
      `urn: urn:edoxen:contact:{scope}:{local-id}`; the collection's
      `scope` MUST match the scope segment in member URNs.
    additionalProperties: false
    properties:
      scope:
        type: string
      title:
        type: array
        items:
          "$ref": "#/$defs/LocalizedString"
      contacts:
        type: array
        items:
          "$ref": "#/$defs/Contact"
      extensions:
        type: array
        items:
          "$ref": "#/$defs/MeetingExtension"
  VenueRegister:
    type: object
    description: 'Registry of Venues indexed by scoped URN. Mirrors ContactRegister.

      '
    additionalProperties: false
    properties:
      scope:
        type: string
      title:
        type: array
        items:
          "$ref": "#/$defs/LocalizedString"
      venues:
        type: array
        items:
          "$ref": "#/$defs/Venue"
      extensions:
        type: array
        items:
          "$ref": "#/$defs/MeetingExtension"
  ActionType:
    type: string
    description: |
      Action verb. Edoxen::Enums::ACTION_TYPE lists the canonical set
      (28 values). The schema is permissive — adopters may use
      body-specific verbs (e.g. "scopes", "directs", "establishes")
      outside the canonical set. The canonical set is advisory; the
      body_vocabulary mechanism (1.0, TODO.refactor/1.0-design) will
      eventually map body-specific verbs to canonical types.
  ConsiderationType:
    type: string
    description: |
      Consideration verb. Edoxen::Enums::CONSIDERATION_TYPE lists the
      canonical set. The schema is permissive — adopters may use
      body-specific verbs outside the canonical set (same rationale as
      ActionType).
